<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MTA Analysis Details</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

</div>
    <div class="container">
        <h1>MTA Fare Analysis Dashboard</h1>
            <div class="download-container">
    <a href="https://raw.githubusercontent.com/AlvaDave/MTA-Inflation-Project/refs/heads/main/MTA%20Raw%20Data.csv" 
       target="_blank" 
       class="btn-download">
        <i class="fas fa-file-download"></i> Download Raw Dataset (.csv)
    </a>

        <div class="controls-panel">
            <div class="control-group">
                <label for="fare_dropdown">Fare Type:</label>
                <select id="fare_dropdown" onchange="updateChart()">
                    <option value="compare_all">📊 Compare All Fares</option>
                    <option value="base_fare">Base Fare</option>
                    <option value="30unlimited">30 Day Unlimited</option>
                    <option value="14unlimited">14 Day Unlimited</option>
                    <option value="7unlimited">7 Day Unlimited</option>
                    <option value="1unlimited">1 Day Unlimited</option>
                </select>
            </div>

            <div class="control-group">
                <input type="checkbox" id="adjust_checkbox" onchange="updateChart()">
                <label for="adjust_checkbox">Show Inflation Adjusted (2025 $)</label>
            </div>
        </div>

        <div class="chart-container">
            <iframe id="chart_frame" src="compare_all.html" width="100%" height="500px" frameborder="0"></iframe>
        </div>
        
        <p><a href="index.html">← Back to Portfolio</a></p>
    </div>

    <script>
        function updateChart() {
            const fare = document.getElementById('fare_dropdown').value;
            const isAdjusted = document.getElementById('adjust_checkbox').checked;
            const frame = document.getElementById('chart_frame');

            // Construct the filename: e.g., '30unlimited_adjusted.html'
            let fileName = isAdjusted ? `${fare}_adjusted.html` : `${fare}.html`;
            frame.src = fileName;
        }
    </script>
</body>
</html>
