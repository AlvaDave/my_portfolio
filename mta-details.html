<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MTA Analysis Details</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>MTA Fare Analysis Dashboard</h1>
        <div class="download-container">
            <a href="https://raw.githubusercontent.com/AlvaDave/MTA-Inflation-Project/refs/heads/main/MTA%20Raw%20Data.csv" target="_blank" class="btn-download">
                <i class="fas fa-file-download"></i> Download Raw Dataset (.csv)
            </a>
        </div>

        <div class="controls-panel">
            <div class="control-group">
                <label for="fare_dropdown_1">Fare Type:</label>
                <select id="fare_dropdown_1" onchange="updateHistoricalChart()">
                    <option value="MTA_HTML/compare_all">📊 Compare All Fares</option>
                    <option value="MTA_HTML/base_fare">Base Fare</option>
                    <option value="MTA_HTML/30unlimited">30 Day Unlimited</option>
                    <option value="MTA_HTML/14unlimited">14 Day Unlimited</option>
                    <option value="MTA_HTML/7unlimited">7 Day Unlimited</option>
                    <option value="MTA_HTML/1unlimited">1 Day Unlimited</option>
                </select>
            </div>

            <div class="control-group">
                <input type="checkbox" id="adjust_checkbox_1" onchange="updateHistoricalChart()">
                <label for="adjust_checkbox_1">Show Adjusted Inflation in 2025 USD</label>
            </div>
        </div>

        <div class="chart-container">
            <iframe id="chart_frame_1" src="MTA_HTML/compare_all.html" width="100%" height="500px" frameborder="0"></iframe>
        </div>
    </div>



    <hr> <div class="container">
        <h1>MTA Fare Growth Rate Analysis</h1>
        
        <div class="controls-panel">
            <div class="control-group">
                <label for="fare_dropdown_2">Fare Type:</label>
                <select id="fare_dropdown_2" onchange="updateGrowthChart()">
                    <option value="MTA_HTML/base">Base Fare</option> 
                    <option value="MTA_HTML/weekly_fare">7 Day Unlimited</option>
                    <option value="MTA_HTML/monthly_fare">30 Day Unlimited</option>
                </select>
            </div>

            <div class="control-group">
                <input type="checkbox" id="adjust_checkbox_2" onchange="updateGrowthChart()">
                <label for="adjust_checkbox_2">Show Adjusted Inflation in 2025 USD</label>
            </div>
        </div>

        <div class="chart-container">
            <iframe id="chart_frame_2" src="MTA_HTML/base_nominal_trend.html" width="100%" height="600px" frameborder="0"></iframe>
        </div>
        
        <p><a href="index.html">← Back to Portfolio</a></p>
    </div>

    <script>
        // FUNCTION FOR DASHBOARD 1
        function updateHistoricalChart() {
            const fare = document.getElementById('fare_dropdown_1').value;
            const isAdjusted = document.getElementById('adjust_checkbox_1').checked;
            const frame = document.getElementById('chart_frame_1');

            let fileName = isAdjusted ? `${fare}_adjusted.html` : `${fare}.html`;
            frame.src = fileName;
        }

        // FUNCTION FOR DASHBOARD 2
        function updateGrowthChart() {
            const fare = document.getElementById('fare_dropdown_2').value;
            const isComprehensive = document.getElementById('adjust_checkbox_2').checked;
            const frame = document.getElementById('chart_frame_2');

            // Logic: Nominal Trend (unchecked) vs Complete Analysis (checked)
            let fileName = isComprehensive ? `${fare}_complete_analysis.html` : `${fare}_nominal_trend.html`;
            
            frame.src = fileName;
        }
    </script>
</body>
</html>
